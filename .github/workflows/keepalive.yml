name: Supabase keep-alive ping

# Supabase's free tier pauses a project after 7 days with no activity.
# This pings a real database write every 2 days so a dry spell between
# dinners never lets that happen. See supabase/04_cron.sql for the
# server-side janitor jobs this is unrelated to (those clean up old rooms;
# this just keeps the project itself awake).

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/ping" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
